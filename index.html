<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Radios libres" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-180.png" />
  <title>Radios libres España</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:#121826;
      --panel-2:#182133;
      --soft:#22304a;
      --text:#eef3ff;
      --muted:#9fb0d1;
      --accent:#4f8cff;
      --accent-2:#80a8ff;
      --ok:#23c16b;
      --danger:#ff5d73;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:22px;
      --bg-gradient:
        radial-gradient(circle at top right, rgba(79,140,255,.18), transparent 28%),
        radial-gradient(circle at top left, rgba(128,168,255,.10), transparent 24%),
        linear-gradient(180deg, #09111d 0%, #0b0f17 100%);
    }
    body.theme-light{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --panel-2:#eef3fb;
      --soft:#dce6f5;
      --text:#172033;
      --muted:#5d6b85;
      --accent:#2f6df6;
      --accent-2:#5f8fff;
      --ok:#158f4e;
      --danger:#d93f56;
      --shadow:0 10px 30px rgba(23,32,51,.10);
      --bg-gradient:
        radial-gradient(circle at top right, rgba(47,109,246,.12), transparent 28%),
        radial-gradient(circle at top left, rgba(95,143,255,.10), transparent 24%),
        linear-gradient(180deg, #f9fbff 0%, #edf3fb 100%);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg-gradient);
      color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      display:flex;
      justify-content:center;
      padding:12px 12px 104px;
      transition:background .25s ease, color .25s ease;
    }
    .app{
      width:min(100%, 860px);
    }
    .hero{
      background:linear-gradient(180deg, rgba(24,33,51,.95), rgba(18,24,38,.95));
      border:1px solid rgba(255,255,255,.07);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
      position:sticky;
      top:10px;
      z-index:10;
      backdrop-filter: blur(14px);
    }
    .hero-top{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      gap:14px;
      align-items:center;
    }
    .logo{
      width:54px;height:54px;border-radius:18px;
      display:grid;place-items:center;
      background:linear-gradient(135deg, var(--accent), #3457ff);
      box-shadow:0 8px 20px rgba(79,140,255,.35);
      font-size:28px;
    }
    h1{
      margin:0;
      font-size:1.35rem;
      line-height:1.1;
    }
    .sub{
      color:var(--muted);
      margin-top:4px;
      font-size:.95rem;
    }
    .controls{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      margin-top:16px;
    }
    .search, .chip-row, .player, .station-card{
      border:1px solid rgba(255,255,255,.07);
      background:rgba(18,24,38,.92);
    }
    .search{
      border-radius:18px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 14px;
      min-height:50px;
    }
    .search input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:1rem;
    }
    .button{
      border:0;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:0 15px;
      min-height:50px;
      font-weight:700;
      color:var(--text);
      background:linear-gradient(135deg, var(--accent), #3f68ff);
      box-shadow:0 10px 20px rgba(79,140,255,.28);
    }
    .button.ghost{
      background:rgba(255,255,255,.05);
      box-shadow:none;
      color:var(--muted);
    }
    body.theme-light .button.ghost{
      background:rgba(23,32,51,.06);
    }
    .theme-toggle{
      width:50px;
      min-width:50px;
      height:50px;
      padding:0;
      display:grid;
      place-items:center;
      font-size:1.25rem;
    }
    .chip-row{
      margin-top:14px;
      padding:8px;
      border-radius:20px;
      display:flex;
      gap:8px;
      overflow:auto;
      scrollbar-width:none;
    }
    .chip-row::-webkit-scrollbar{display:none}
    .chip{
      border:0;
      cursor:pointer;
      white-space:nowrap;
      color:var(--muted);
      background:transparent;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      font-weight:700;
    }
    .chip.active{
      color:var(--text);
      background:rgba(79,140,255,.16);
      box-shadow:inset 0 0 0 1px rgba(79,140,255,.34);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:14px;
      margin-top:16px;
    }
    .station-card{
      border-radius:24px;
      padding:14px;
      box-shadow:var(--shadow);
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .station-card:hover{
      transform:translateY(-2px);
      border-color:rgba(79,140,255,.35);
      background:rgba(24,33,51,.96);
    }
    .station-top{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .station-name{
      margin:0;
      font-size:1.04rem;
      line-height:1.2;
    }

    .card-actions{
      display:flex;
      gap:10px;
      margin-top:14px;
    }
    .play-btn{ flex:1.25; }
    .fav-btn{ flex:.75; }
    .play-btn, .fav-btn{
      flex:1;
      min-height:42px;
      border-radius:14px;
      cursor:pointer;
      border:0;
      color:var(--text);
      font-weight:800;
    }
    .play-btn{
      background:linear-gradient(135deg, var(--accent), #3f68ff);
    }
    .fav-btn{
      background:rgba(255,255,255,.06);
      color:var(--muted);
    }
    .fav-btn.active{
      color:#ffd569;
      background:rgba(255,213,105,.11);
    }
    .player{
      position:fixed;
      left:max(10px, env(safe-area-inset-left));
      right:max(10px, env(safe-area-inset-right));
      bottom:max(10px, env(safe-area-inset-bottom));
      z-index:20;
      border-radius:24px;
      box-shadow:0 16px 40px rgba(0,0,0,.45);
      padding:12px;
      background:rgba(12,18,29,.92);
      backdrop-filter: blur(18px);
    }
    .player-inner{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
    }
    .now{
      min-width:0;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .eq{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(135deg, rgba(79,140,255,.2), rgba(79,140,255,.08));
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.07);
      flex:none;
      position:relative;
      overflow:hidden;
    }
    .bars{
      display:flex;gap:3px;align-items:flex-end;height:20px;
    }
    .bar{
      width:4px;border-radius:999px;background:var(--accent);
      animation:eq 1s infinite ease-in-out;
      transform-origin:bottom;
    }
    .bar:nth-child(1){height:7px;animation-delay:.1s}
    .bar:nth-child(2){height:16px;animation-delay:.25s}
    .bar:nth-child(3){height:10px;animation-delay:.4s}
    @keyframes eq{
      0%,100%{transform:scaleY(.55);opacity:.7}
      50%{transform:scaleY(1);opacity:1}
    }
    .title-wrap{min-width:0}
    .player-title{
      margin:0;
      font-size:.98rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .player-meta{
      color:var(--muted);
      font-size:.88rem;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .player-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .icon-btn{
      width:46px;height:46px;border-radius:16px;border:0;cursor:pointer;
      display:grid;place-items:center;
      color:var(--text);
      background:rgba(255,255,255,.06);
      font-size:1rem;
    }
    .icon-btn.primary{
      background:linear-gradient(135deg, var(--accent), #3f68ff);
      width:54px;height:54px;border-radius:18px;
    }
    .volume{
      width:120px;
      accent-color:#7ea4ff;
    }
    .hidden{display:none !important}
    .empty{
      margin-top:16px;
      border-radius:24px;
      padding:24px;
      text-align:center;
      color:var(--muted);
      background:rgba(18,24,38,.85);
      border:1px solid rgba(255,255,255,.07);
    }
    body.theme-light .hero,
    body.theme-light .search,
    body.theme-light .chip-row,
    body.theme-light .player,
    body.theme-light .station-card,
    body.theme-light .empty{
      background:rgba(255,255,255,.92);
      border-color:rgba(23,32,51,.08);
    }
    body.theme-light .hero{
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(244,247,251,.96));
    }
    body.theme-light .station-card:hover{
      background:#ffffff;
      border-color:rgba(47,109,246,.24);
    }
    body.theme-light .search input,
    body.theme-light .button,
    body.theme-light .icon-btn,
    body.theme-light .chip.active{
      color:var(--text);
    }
    body.theme-light .player-meta,
    body.theme-light .empty{
      color:var(--muted);
    }
    @media (max-width:640px){
      body{padding:8px 8px 112px}
      .hero{padding:14px;border-radius:22px;top:8px}
      .hero-top{gap:10px;align-items:flex-start}
      .brand{gap:10px;align-items:center;min-width:0}
      .logo{width:44px;height:44px;border-radius:14px;font-size:22px}
      h1{font-size:1.08rem}
      .controls{grid-template-columns:1fr auto;gap:10px;margin-top:12px}
      .search{min-height:46px;padding:0 12px}
      .theme-toggle{width:46px;min-width:46px;height:46px}
      .chip-row{margin-top:12px;padding:6px;gap:6px;scroll-snap-type:x proximity}
      .chip{min-height:36px;padding:0 12px;scroll-snap-align:start}
      .grid{grid-template-columns:1fr;gap:12px;margin-top:14px}
      .station-card{padding:13px;border-radius:20px}
      .card-actions{gap:8px}
      .play-btn,.fav-btn{min-height:44px}
      .player{left:8px;right:8px;bottom:8px;border-radius:20px}
      .player-inner{grid-template-columns:1fr;padding:12px}
      .player-title{font-size:1rem}
      .player-actions{justify-content:space-between}
      .volume{width:100%}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="logo">📻</div>
          <div>
            <h1>Radios libres España</h1>
            
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;"><button id="themeToggle" class="button ghost theme-toggle" type="button" aria-label="Cambiar tema">🌙</button><button id="installBtn" class="button ghost hidden" type="button">Instalar</button></div>
      </div>

      <div class="controls">
        <label class="search" aria-label="Buscar emisoras">
          <span>🔎</span>
          <input id="searchInput" type="search" placeholder="Buscar emisora, ciudad o tipo..." />
        </label>
        <button class="button ghost theme-toggle" id="searchClearBtn" type="button" aria-label="Limpiar búsqueda">✕</button>
      </div>

      <div class="chip-row" id="filters">
        <button class="chip" data-filter="favoritas" type="button" aria-label="Favoritas">⭐</button>
        <button class="chip active" data-filter="all" type="button">Todas</button>
        <button class="chip" data-filter="generalista" type="button">Generalistas</button>
        <button class="chip" data-filter="musica" type="button">Musicales</button>
        <button class="chip" data-filter="publica" type="button">Públicas</button>
        <button class="chip" data-filter="deporte" type="button">Deporte</button>
      </div>
    </section>

    <section class="grid" id="stationGrid"></section>
    <section class="empty hidden" id="emptyState">No hay emisoras que coincidan con tu búsqueda.</section>
  </main>

  <section class="player" aria-label="Reproductor">
    <div class="player-inner">
      <div class="now">
        <div class="eq" aria-hidden="true">
          <div class="bars">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
        </div>
        <div class="title-wrap">
          <h2 class="player-title" id="playerTitle">Selecciona una emisora</h2>
          <div class="player-meta" id="playerMeta">Lista para reproducir</div>
        </div>
      </div>
      <div class="player-actions">
        <button class="icon-btn" id="prevBtn" type="button" title="Anterior">⏮️</button>
        <button class="icon-btn primary" id="mainPlayBtn" type="button" title="Reproducir/Pausar">▶️</button>
        <button class="icon-btn" id="nextBtn" type="button" title="Siguiente">⏭️</button>
        <button class="icon-btn" id="muteBtn" type="button" title="Silencio">🔊</button>
        <input id="volumeInput" class="volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volumen" />
      </div>
    </div>
    <audio id="audio" preload="none" playsinline crossorigin="anonymous"></audio>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>

          "https://rockfm-barcelona.flumotion.com/playlist.m3u8"
        ],
        tags: ["Rock", "Clásicos"]

      {
        id: "esradio",
        name: "esRadio",
        city: "España",
        type: "generalista",
        group: "generalista",
        dial: "FM · Generalista",
        icon: "esR",
        streams: [
          "https://libertaddigital-radio-live1.flumotion.com/libertaddigital/ld-live1-high.mp3",
          "https://libertaddigital-radio-live1.flumotion.com/libertaddigital/ld-live1-high.aac"
        ],
        tags: ["Actualidad", "Opinión"]
      },
    ];

    const grid = document.getElementById("stationGrid");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const filters = document.getElementById("filters");
    const audio = document.getElementById("audio");
    const playerTitle = document.getElementById("playerTitle");
    const playerMeta = document.getElementById("playerMeta");
    const mainPlayBtn = document.getElementById("mainPlayBtn");
    const volumeInput = document.getElementById("volumeInput");
    const muteBtn = document.getElementById("muteBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const searchClearBtn = document.getElementById("searchClearBtn");
    const themeToggle = document.getElementById("themeToggle");
    const installBtn = document.getElementById("installBtn");

    let activeFilter = localStorage.getItem("radio.filter") || "all";
    let currentId = localStorage.getItem("radio.currentId") || null;
    let favorites = new Set(JSON.parse(localStorage.getItem("radio.favorites") || "[]"));
    let deferredPrompt = null;
    let hls = null;
    let activeStreamIndex = 0;
    let activeTheme = localStorage.getItem("radio.theme") || "dark";

    function destroyHls() {
      if (hls) {
        hls.destroy();
        hls = null;
      }
    }

    function canUseNativeHls() {
      const probe = document.createElement("audio");
      return typeof probe.canPlayType === "function"
        && (probe.canPlayType("application/vnd.apple.mpegurl") || probe.canPlayType("audio/mpegurl"));
    }

    function setStreamSource(url) {
      destroyHls();
      audio.removeAttribute("src");
      audio.load();

      const isHls = /\.m3u8($|\?)/i.test(url);

      if (isHls) {
        if (canUseNativeHls()) {
          audio.src = url;
          return;
        }
        if (window.Hls && window.Hls.isSupported()) {
          hls = new window.Hls({
            enableWorker: true,
            lowLatencyMode: false,
          });
          hls.loadSource(url);
          hls.attachMedia(audio);
          return;
        }
      }

      audio.src = url;
    }

    audio.volume = Number(localStorage.getItem("radio.volume") || 1);
    volumeInput.value = audio.volume;

    function persist() {
      localStorage.setItem("radio.filter", activeFilter);
      localStorage.setItem("radio.currentId", currentId || "");
      localStorage.setItem("radio.favorites", JSON.stringify([...favorites]));
      localStorage.setItem("radio.volume", String(audio.volume));
      localStorage.setItem("radio.theme", activeTheme);
    }

    function getVisibleStations() {
      const q = searchInput.value.trim().toLowerCase();
      return stations.filter(st => {
        const haystack = [
          st.name, st.city, st.type, st.group, st.dial, ...(st.tags || [])
        ].join(" ").toLowerCase();

        const filterOk = activeFilter === "all"
          || (activeFilter === "favoritas" ? favorites.has(st.id)
          : activeFilter === "publica" ? st.group === "publica"
          : activeFilter === "deporte" ? (st.tags || []).some(t => t.toLowerCase().includes("deporte"))
          : st.type === activeFilter || st.group === activeFilter);

        const searchOk = !q || haystack.includes(q);
        return filterOk && searchOk;
      }).sort((a, b) => {
        const favDelta = Number(favorites.has(b.id)) - Number(favorites.has(a.id));
        if (favDelta !== 0 && activeFilter === "all") return favDelta;
        return 0;
      });
    }

    function render() {
      [...filters.querySelectorAll(".chip")].forEach(chip => {
        chip.classList.toggle("active", chip.dataset.filter === activeFilter);
      });

      const visible = getVisibleStations();
      emptyState.classList.toggle("hidden", visible.length > 0);

      grid.innerHTML = visible.map(st => {
        const isFav = favorites.has(st.id);
        const isActive = currentId === st.id;
        return `
          <article class="station-card" data-id="${st.id}">
            <div class="station-top">
              <div>
                <h3 class="station-name">${st.name}</h3>
              </div>
            </div>
            <div class="card-actions">
              <button class="play-btn" type="button" data-play="${st.id}">${isActive && !audio.paused ? "Pausar" : "Escuchar"}</button>
              <button class="fav-btn ${isFav ? "active" : ""}" type="button" data-fav="${st.id}" aria-label="Marcar como favorita">${isFav ? "★" : "☆"}</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function byId(id) {
      return stations.find(s => s.id === id) || null;
    }

    function currentStation() {
      return byId(currentId);
    }

    function streamList(station) {
      if (!station) return [];
      return Array.isArray(station.streams) && station.streams.length
        ? station.streams
        : (station.stream ? [station.stream] : []);
    }

    function currentStream(station) {
      const list = streamList(station);
      return list[activeStreamIndex] || list[0] || "";
    }

    async function playStation(id, streamIndex = 0) {
      const st = byId(id);
      if (!st) return;

      const list = streamList(st);
      if (!list.length) return;

      activeStreamIndex = Math.max(0, Math.min(streamIndex, list.length - 1));
      const url = currentStream(st);

      const sourceChanged = currentId !== id || !audio.dataset.streamUrl || audio.dataset.streamUrl !== url;
      currentId = id;

      if (sourceChanged) {
        setStreamSource(url);
        audio.dataset.streamUrl = url;
      }

      playerTitle.textContent = st.name;
      playerMeta.textContent = `${st.city} · ${st.dial}`;
      persist();
      render();

      try {
        await audio.play();
        updatePlayButtons();
        updateMediaSession(st);
      } catch (err) {
        const unsupportedHls = /\.m3u8($|\?)/i.test(url) && !(canUseNativeHls() || (window.Hls && window.Hls.isSupported()));
        playerMeta.textContent = unsupportedHls
          ? "Tu navegador no soporta esta señal HLS. Prueba otra emisora o instala la app."
          : "No se pudo iniciar la reproducción. Toca otra vez o prueba otra emisora.";
        console.error(err);
      }
    }

    function tryNextStream() {
      const st = currentStation();
      if (!st) return;
      const list = streamList(st);
      if (activeStreamIndex + 1 < list.length) {
        playStation(st.id, activeStreamIndex + 1);
      } else {
        playerMeta.textContent = "Esta emisora no respondió con ninguna de sus señales de respaldo.";
        updatePlayButtons();
      }
    }

    function togglePlay() {
      const st = currentStation();
      if (!st) {
        const visible = getVisibleStations();
        if (visible.length) playStation(visible[0].id);
        return;
      }
      if (audio.paused) {
        playStation(st.id);
      } else {
        audio.pause();
      }
      updatePlayButtons();
    }

    function updatePlayButtons() {
      const isPlaying = !audio.paused;
      mainPlayBtn.textContent = isPlaying ? "⏸️" : "▶️";
      const st = currentStation();
      if (st) {
        playerTitle.textContent = st.name;
        playerMeta.textContent = audio.error
          ? "Error en la señal. Prueba otra emisora o actualiza la URL del stream."
          : `${st.city} · ${st.dial}`;
      }
      render();
    }

    function nextStation(step = 1) {
      const visible = getVisibleStations();
      if (!visible.length) return;
      const idx = Math.max(0, visible.findIndex(s => s.id === currentId));
      const next = visible[(idx + step + visible.length) % visible.length];
      playStation(next.id);
    }

    function toggleFavorite(id) {
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      persist();
      render();
    }

    function applyTheme(theme) {
      activeTheme = theme === "light" ? "light" : "dark";
      document.body.classList.toggle("theme-light", activeTheme === "light");
      document.body.classList.toggle("theme-dark", activeTheme === "dark");
      themeToggle.textContent = activeTheme === "light" ? "☀️" : "🌙";
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if (metaTheme) metaTheme.setAttribute("content", activeTheme === "light" ? "#f4f7fb" : "#0b0f17");
      persist();
    }

    function toggleTheme() {
      applyTheme(activeTheme === "dark" ? "light" : "dark");
    }

    function updateMediaSession(st) {
      if (!("mediaSession" in navigator) || !st) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: st.name,
        artist: "Radio online España",
        album: st.dial
      });
    }

    if ("mediaSession" in navigator) {
      navigator.mediaSession.setActionHandler("play", () => togglePlay());
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("previoustrack", () => nextStation(-1));
      navigator.mediaSession.setActionHandler("nexttrack", () => nextStation(1));
    }

    filters.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      activeFilter = chip.dataset.filter;
      persist();
      render();
    });

    grid.addEventListener("click", (e) => {
      const play = e.target.closest("[data-play]");
      const fav = e.target.closest("[data-fav]");
      if (play) {
        const id = play.dataset.play;
        if (currentId === id && !audio.paused) audio.pause();
        else playStation(id);
      }
      if (fav) toggleFavorite(fav.dataset.fav);
    });

    searchInput.addEventListener("input", render);
    searchClearBtn.addEventListener("click", () => {
      searchInput.value = "";
      render();
      searchInput.focus();
    });
    themeToggle.addEventListener("click", toggleTheme);
    mainPlayBtn.addEventListener("click", togglePlay);
    prevBtn.addEventListener("click", () => nextStation(-1));
    nextBtn.addEventListener("click", () => nextStation(1));

    volumeInput.addEventListener("input", () => {
      audio.volume = Number(volumeInput.value);
      audio.muted = audio.volume === 0;
      muteBtn.textContent = audio.muted ? "🔇" : "🔊";
      persist();
    });

    muteBtn.addEventListener("click", () => {
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted ? "🔇" : "🔊";
      if (!audio.muted && Number(volumeInput.value) === 0) {
        volumeInput.value = 0.8;
        audio.volume = 0.8;
      }
    });

    audio.addEventListener("play", updatePlayButtons);
    audio.addEventListener("pause", updatePlayButtons);
    audio.addEventListener("error", () => {
      const st = currentStation();
      if (st) {
        playerMeta.textContent = "Probando una señal alternativa...";
        tryNextStream();
        return;
      }
      updatePlayButtons();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") persist();
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove("hidden");
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.add("hidden");
    });

    // Estado inicial
    applyTheme(activeTheme);
    render();
    const initial = currentStation();
    if (initial) {
      playerTitle.textContent = initial.name;
      playerMeta.textContent = `${initial.city} · ${initial.dial}`;
      updateMediaSession(initial);
    }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
